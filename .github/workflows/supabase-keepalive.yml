name: Supabase Keepalive

# Free-tier Supabase projects pause after ~7 days of inactivity and are deleted
# after 90 days paused. This job pings the REST API on a schedule so the live
# database stays warm — protecting both the data and the site's live readout.
#
# NOTES:
#   - Scheduled workflows run only from the default branch (main).
#   - GitHub disables scheduled workflows after 60 days of repo inactivity. If
#     that happens, re-enable it from the Actions tab (or push any commit). The
#     committed data/bets_snapshot.json remains a durable backup regardless.
#   - The anon/publishable key below is already public (it ships in the site's
#     client JS); security is enforced by Supabase RLS, not key secrecy.

on:
  schedule:
    - cron: '0 9 */2 * *'   # every 2 days at 09:00 UTC (well within the 7-day limit)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (resets the inactivity timer)
        env:
          SUPABASE_URL: https://fsccjjzutaxfonecmjxc.supabase.co
          SUPABASE_KEY: sb_publishable_dlBwcGsOgCpFY8yuCULFEA_A6atHjfy
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Range: 0-0" \
            "${SUPABASE_URL}/rest/v1/bets?select=id")
          echo "Supabase ping returned HTTP $code"
          if [ "$code" != "200" ] && [ "$code" != "206" ]; then
            echo "::error::Unexpected status $code from Supabase keepalive ping"
            exit 1
          fi
